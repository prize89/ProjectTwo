<!DOCTYPE html>
<html lang="en">
<head>

    <title>Store Page</title>
<style>
    *{
        box-sizing: border-box; margin: 0; padding: 0;
    }

    body{
        font-family: 'Times New Roman', Times, Serif;
        background:rgb(139, 186, 171);
    }
header{
    background: bisque;
    color: Black;
    padding: 15px 10%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position:sticky;
    top:0;
    z-index: 10;
}
header a{
    color: brown;
    text-decoration: none;
    margin: 40px;
    font-size: 18px;
}
h1{
    text-align: center;
}
.product-grid{
    display: grid;
    grid-template-columns:repeat(3,1fr); gap: 20px;
    padding:0 10% 50px 10%;
}
.card{
    background: beige;
    border-radius:20px;
    padding: 30px;
    text-align: center;
    transition: transform 0.3s ease;
}
.card:hover{
    transform: translateY(-10px) scale(1.2);
}
.card img{width:100%;height:150px;object-fit: contain;}
.buy-btn{
    display: inline-block;
    padding: 10px 20x;
    background: grey;
    color: rgb(0, 255, 64);
    text-decoration: none;
    border-radius: 10px;
    margin-top: 15px;
}

</style>
</head>
<body>
    <header>
        <a href="index400.html">Home</a>
        <nav>
            <a href="https://www.apple.com/iphone/">iPhone</a>
            <a href="https://www.apple.com/macbook-pro/">Macbook</a>
            <a href="https://www.apple.com/ipad/">iPad</a>
            <a href="https://www.apple.com/watch/">Apple Watch</a>
        </nav>
    </header>
    <h1>Welcome to the Apple Store</h1>
    <div class="product-grid">
        <div class="card"><img src="iPhone17Pic.webp"><h3>iPhone
        17 Pro </h3><a href="#" class="buy-btn">Buy</a></div>
        <div class="card"><img src="Macbook2025.png"><h3>Macbook Pro
        14-inch </h3><a href="#" class="buy-btn">Buy</a></div>
        <div class="card"><img src="iPad.webp"><h3>iPad Air 
        13-inch </h3><a href="#" class="buy-btn">Buy</a></div>

        </h3></div>

        </h3></div>
    </div>
</body>
